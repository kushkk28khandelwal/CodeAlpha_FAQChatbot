<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FAQ Chatbot</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .chat-container {
      width: 90%;
      max-width: 700px;
      height: 90vh;
      display: flex;
      flex-direction: column;
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      overflow: hidden;
    }
    .chat-header {
      background: linear-gradient(to right, #7f00ff, #e100ff);
      padding: 20px 24px;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .bot-avatar {
      width: 46px;
      height: 46px;
      background: rgba(255,255,255,0.2);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.4rem;
    }
    .header-info h2 { color: white; font-size: 1.2rem; }
    .header-info p { color: rgba(255,255,255,0.7); font-size: 0.8rem; }
    .online-dot {
      width: 10px; height: 10px;
      background: #00ff88;
      border-radius: 50%;
      display: inline-block;
      margin-right: 6px;
    }
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .chat-messages::-webkit-scrollbar { width: 4px; }
    .chat-messages::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 4px; }
    .message {
      display: flex;
      gap: 10px;
      max-width: 80%;
      animation: fadeIn 0.3s ease;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .message.user { align-self: flex-end; flex-direction: row-reverse; }
    .message.bot { align-self: flex-start; }
    .avatar {
      width: 34px; height: 34px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem;
      flex-shrink: 0;
    }
    .bot .avatar { background: linear-gradient(to right, #7f00ff, #e100ff); }
    .user .avatar { background: linear-gradient(to right, #11998e, #38ef7d); }
    .bubble {
      padding: 12px 16px;
      border-radius: 18px;
      font-size: 0.92rem;
      line-height: 1.5;
      color: white;
    }
    .bot .bubble {
      background: rgba(127, 0, 255, 0.25);
      border: 1px solid rgba(127,0,255,0.3);
      border-top-left-radius: 4px;
    }
    .user .bubble {
      background: rgba(17, 153, 142, 0.3);
      border: 1px solid rgba(17,153,142,0.3);
      border-top-right-radius: 4px;
    }
    .typing { display: flex; gap: 4px; align-items: center; padding: 14px 16px; }
    .typing span {
      width: 8px; height: 8px;
      background: rgba(255,255,255,0.5);
      border-radius: 50%;
      animation: bounce 1s infinite;
    }
    .typing span:nth-child(2) { animation-delay: 0.15s; }
    .typing span:nth-child(3) { animation-delay: 0.3s; }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }
    .suggestions {
      padding: 10px 20px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .suggestion-btn {
      background: rgba(127,0,255,0.2);
      border: 1px solid rgba(127,0,255,0.4);
      color: rgba(255,255,255,0.8);
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 0.78rem;
      cursor: pointer;
      transition: background 0.2s;
    }
    .suggestion-btn:hover { background: rgba(127,0,255,0.4); }
    .chat-input {
      padding: 16px 20px;
      border-top: 1px solid rgba(255,255,255,0.1);
      display: flex;
      gap: 12px;
      align-items: center;
    }
    .chat-input input {
      flex: 1;
      padding: 12px 18px;
      border-radius: 30px;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.07);
      color: white;
      font-size: 0.95rem;
      outline: none;
      font-family: inherit;
    }
    .chat-input input::placeholder { color: rgba(255,255,255,0.3); }
    .send-btn {
      width: 46px; height: 46px;
      background: linear-gradient(to right, #7f00ff, #e100ff);
      border: none;
      border-radius: 50%;
      color: white;
      font-size: 1.2rem;
      cursor: pointer;
      transition: opacity 0.2s;
      display: flex; align-items: center; justify-content: center;
    }
    .send-btn:hover { opacity: 0.85; }
  </style>
</head>
<body>
  <div class="chat-container">
    <div class="chat-header">
      <div class="bot-avatar">🤖</div>
      <div class="header-info">
        <h2>AI FAQ Assistant</h2>
        <p><span class="online-dot"></span>Online — CodeAlpha AI Internship</p>
      </div>
    </div>

    <div class="chat-messages" id="chat-messages">
      <div class="message bot">
        <div class="avatar">🤖</div>
        <div class="bubble">👋 Hello! I'm your AI FAQ Assistant. Ask me anything about <strong>Artificial Intelligence, Machine Learning, Python, or CodeAlpha!</strong></div>
      </div>
    </div>

    <div class="suggestions">
      <button class="suggestion-btn" onclick="sendSuggestion('What is AI?')">What is AI?</button>
      <button class="suggestion-btn" onclick="sendSuggestion('What is machine learning?')">Machine Learning</button>
      <button class="suggestion-btn" onclick="sendSuggestion('How to start learning AI?')">How to start AI?</button>
      <button class="suggestion-btn" onclick="sendSuggestion('What is CodeAlpha?')">What is CodeAlpha?</button>
    </div>

    <div class="chat-input">
      <input type="text" id="user-input" placeholder="Ask a question..." onkeydown="if(event.key==='Enter') sendMessage()"/>
      <button class="send-btn" onclick="sendMessage()">➤</button>
    </div>
  </div>

  <script>
    function appendMessage(text, sender) {
      const container = document.getElementById("chat-messages");
      const msg = document.createElement("div");
      msg.className = `message ${sender}`;
      msg.innerHTML = `
        <div class="avatar">${sender === "bot" ? "🤖" : "👤"}</div>
        <div class="bubble">${text}</div>
      `;
      container.appendChild(msg);
      container.scrollTop = container.scrollHeight;
    }

    function showTyping() {
      const container = document.getElementById("chat-messages");
      const typing = document.createElement("div");
      typing.className = "message bot";
      typing.id = "typing-indicator";
      typing.innerHTML = `
        <div class="avatar">🤖</div>
        <div class="bubble typing"><span></span><span></span><span></span></div>
      `;
      container.appendChild(typing);
      container.scrollTop = container.scrollHeight;
    }

    function removeTyping() {
      const el = document.getElementById("typing-indicator");
      if (el) el.remove();
    }

    async function sendMessage() {
      const input = document.getElementById("user-input");
      const text = input.value.trim();
      if (!text) return;

      appendMessage(text, "user");
      input.value = "";
      showTyping();

      try {
        const res = await fetch("/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message: text })
        });
        const data = await res.json();
        setTimeout(() => {
          removeTyping();
          appendMessage(data.response, "bot");
        }, 800);
      } catch (e) {
        removeTyping();
        appendMessage("❌ Server error. Make sure Flask app is running.", "bot");
      }
    }

    function sendSuggestion(text) {
      document.getElementById("user-input").value = text;
      sendMessage();
    }
  </script>
</body>
</html>
